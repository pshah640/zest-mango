<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zest Mango — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--green:#1a5c2a;--green-light:#2d8a45;--gold:#d4a017;--cream:#fdf8f0;--text:#1a1a1a;--muted:#666;--border:#e0d8c8;--bg:#f5f5f5;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);}
  .login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--green);}
  .login-box{background:white;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:360px;text-align:center;}
  .login-box h1{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--green);margin-bottom:0.3rem;}
  .login-box p{color:var(--muted);font-size:0.9rem;margin-bottom:1.5rem;}
  .login-box input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:1rem;margin-bottom:1rem;font-family:'DM Sans',sans-serif;outline:none;}
  .login-box input:focus{border-color:var(--green-light);}
  .btn-login{width:100%;background:var(--green);color:white;border:none;border-radius:10px;padding:13px;font-size:1rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .btn-login:hover{background:var(--green-light);}
  .login-error{color:red;font-size:0.85rem;margin-top:10px;display:none;}
  .dashboard{display:none;}
  .topbar{background:var(--green);color:white;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  .topbar h1{font-family:'Playfair Display',serif;font-size:1.4rem;}
  .topbar-right{display:flex;align-items:center;gap:12px;}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;}
  .sync-dot.syncing{background:#facc15;animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .btn-refresh{background:rgba(255,255,255,0.2);color:white;border:none;border-radius:8px;padding:6px 14px;font-size:0.85rem;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .btn-logout{background:rgba(255,255,255,0.15);color:white;border:none;border-radius:8px;padding:6px 14px;font-size:0.85rem;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;padding:1.5rem;}
  .stat-card{background:white;border-radius:12px;padding:1rem 1.25rem;border:1px solid var(--border);}
  .stat-card .label{font-size:0.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
  .stat-card .value{font-size:1.6rem;font-weight:600;color:var(--green);margin-top:4px;}
  .filters{display:flex;gap:8px;padding:0 1.5rem 1rem;flex-wrap:wrap;align-items:center;}
  .filter-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:0.82rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--text);}
  .filter-btn.active{background:var(--green);color:white;border-color:var(--green);}
  .add-btn{margin-left:auto;background:var(--gold);color:#1a1a1a;border:none;border-radius:8px;padding:8px 16px;font-size:0.85rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .orders-wrap{padding:0 1.5rem 2rem;overflow-x:auto;}
  .orders-table{width:100%;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden;border:1px solid var(--border);font-size:0.88rem;}
  .orders-table th{background:var(--green);color:white;padding:10px 14px;text-align:left;font-weight:500;font-size:0.8rem;}
  .orders-table td{padding:10px 14px;border-bottom:1px solid var(--border);}
  .orders-table tr:last-child td{border-bottom:none;}
  .orders-table tr:hover td{background:#fdf8f0;}
  .status-select{border:none;outline:none;font-weight:600;font-size:0.75rem;padding:3px 8px;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .s-New{background:#fef9c3;color:#854d0e;}
  .s-Confirmed{background:#dcfce7;color:#166534;}
  .s-Delivered{background:#d1fae5;color:#065f46;}
  .s-Cancelled{background:#fee2e2;color:#991b1b;}
  .action-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:white;font-size:0.78rem;cursor:pointer;margin-right:4px;font-family:'DM Sans',sans-serif;}
  .action-btn.del{color:red;border-color:#fecaca;}
  .action-btn.wa{color:#166534;border-color:#bbf7d0;}
  .empty-state{text-align:center;padding:3rem 1rem;color:var(--muted);}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;}
  .modal-overlay.show{display:flex;}
  .modal{background:white;border-radius:16px;padding:1.5rem;width:100%;max-width:400px;margin:1rem;max-height:90vh;overflow-y:auto;}
  .modal h3{font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:1rem;color:var(--green);}
  .modal label{font-size:0.82rem;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:0.3px;display:block;margin-bottom:5px;margin-top:12px;}
  .modal input,.modal select,.modal textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.95rem;outline:none;}
  .modal input:focus,.modal select:focus{border-color:var(--green-light);}
  .modal-btns{display:flex;gap:10px;margin-top:1.2rem;}
  .modal-btns button{flex:1;padding:11px;border-radius:8px;font-size:0.95rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;}
  .btn-save{background:var(--green);color:white;}
  .btn-cancel-m{background:var(--border);color:var(--text);}
  .loading{text-align:center;padding:2rem;color:var(--muted);font-size:0.9rem;}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div style="font-size:2rem;margin-bottom:0.5rem;">🥭</div>
    <h1>Zest Mango</h1>
    <p>Owner Dashboard — Private Access</p>
    <input type="password" id="passInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-login" onclick="doLogin()">Login</button>
    <p class="login-error" id="loginError">Wrong password. Try again.</p>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="topbar">
    <h1>🥭 Zest Mango Dashboard</h1>
    <div class="topbar-right">
      <span class="sync-dot" id="syncDot"></span>
      <span style="font-size:0.8rem;opacity:0.8" id="syncLabel">Live</span>
      <button class="btn-refresh" onclick="loadOrders()">↻ Refresh</button>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="label">Total Orders</div><div class="value" id="statTotal">0</div></div>
    <div class="stat-card"><div class="label">Total Revenue</div><div class="value" id="statRevenue">₹0</div></div>
    <div class="stat-card"><div class="label">New Orders</div><div class="value" id="statNew">0</div></div>
    <div class="stat-card"><div class="label">Delivered</div><div class="value" id="statDelivered">0</div></div>
    <div class="stat-card"><div class="label">Total Kg Sold</div><div class="value" id="statKg">0 kg</div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filterOrders('All',this)">All</button>
    <button class="filter-btn" onclick="filterOrders('New',this)">New</button>
    <button class="filter-btn" onclick="filterOrders('Confirmed',this)">Confirmed</button>
    <button class="filter-btn" onclick="filterOrders('Delivered',this)">Delivered</button>
    <button class="filter-btn" onclick="filterOrders('Cancelled',this)">Cancelled</button>
    <button class="add-btn" onclick="openModal()">+ Add Order</button>
  </div>

  <div class="orders-wrap">
    <table class="orders-table" id="ordersTable">
      <thead><tr><th>#</th><th>Name</th><th>Phone</th><th>Qty</th><th>Amount</th><th>Status</th><th>Time</th><th>Actions</th></tr></thead>
      <tbody id="ordersBody"><tr><td colspan="8"><div class="loading">Loading orders...</div></td></tr></tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Add New Order</h3>
    <label>Customer Name</label><input type="text" id="mName" placeholder="Full name">
    <label>WhatsApp Number</label><input type="tel" id="mPhone" placeholder="10-digit number">
    <label>Address</label><textarea id="mAddress" placeholder="Delivery address" style="resize:vertical;min-height:60px"></textarea>
    <label>Quantity (kg)</label><input type="number" id="mKg" min="10" step="5" placeholder="e.g. 10, 20, 30" oninput="calcModalPrice()">
    <label>Amount (₹)</label><input type="number" id="mAmount" placeholder="Auto-calculated or enter manually">
    <label>Status</label>
    <select id="mStatus"><option>New</option><option>Confirmed</option><option>Delivered</option><option>Cancelled</option></select>
    <div class="modal-btns">
      <button class="btn-cancel-m" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveManualOrder()">Save Order</button>
    </div>
  </div>
</div>

<script>
const JSONBIN_KEY='$2a$10$wXRouZ7ZAAxdM8OzUwpkju.6EL9APq/Id3ow4X/UEVNb.qQZUdUdO';
const BIN_STORAGE_KEY='ZESTMANGO_BIN_v1';
const PASSWORD='zestmango2026';
let allOrders=[];
let currentFilter='All';
let refreshTimer;
let binId=null;

function doLogin(){
  if(document.getElementById('passInput').value===PASSWORD){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('dashboard').style.display='block';
    loadOrders();
    refreshTimer=setInterval(loadOrders,14000);
  } else {
    document.getElementById('loginError').style.display='block';
  }
}

function logout(){
  clearInterval(refreshTimer);
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('dashboard').style.display='none';
  document.getElementById('passInput').value='';
}

async function getOrCreateBin(){
  if(binId)return binId;
  const cached=localStorage.getItem(BIN_STORAGE_KEY);
  if(cached){binId=cached;return binId;}
  // Create new bin
  const res=await fetch('https://api.jsonbin.io/v3/b',{
    method:'POST',
    headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY,'X-Bin-Name':'ZestMangoOrders','X-Bin-Private':'false'},
    body:JSON.stringify({orders:[]})
  });
  const data=await res.json();
  binId=data.metadata.id;
  localStorage.setItem(BIN_STORAGE_KEY,binId);
  return binId;
}

async function loadOrders(){
  setSyncing(true);
  try{
    const id=await getOrCreateBin();
    const res=await fetch('https://api.jsonbin.io/v3/b/'+id+'/latest',{headers:{'X-Master-Key':JSONBIN_KEY}});
    const data=await res.json();
    allOrders=(data.record.orders||[]).slice().reverse();
    renderOrders();
  }catch(e){
    allOrders=JSON.parse(localStorage.getItem('zest_orders')||'[]').slice().reverse();
    renderOrders();
  }
  setSyncing(false);
}

async function saveAllOrders(){
  try{
    const id=await getOrCreateBin();
    const ordered=[...allOrders].reverse();
    await fetch('https://api.jsonbin.io/v3/b/'+id,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},
      body:JSON.stringify({orders:ordered})
    });
  }catch(e){
    localStorage.setItem('zest_orders',JSON.stringify([...allOrders].reverse()));
  }
}

function setSyncing(s){
  const dot=document.getElementById('syncDot');
  const label=document.getElementById('syncLabel');
  dot.classList.toggle('syncing',s);
  label.textContent=s?'Syncing...':'Live';
}

function renderOrders(){
  updateStats();
  const filtered=currentFilter==='All'?allOrders:allOrders.filter(o=>o.status===currentFilter);
  const tbody=document.getElementById('ordersBody');
  if(!filtered.length){
    tbody.innerHTML='<tr><td colspan="8"><div class="empty-state">📭 No orders found</div></td></tr>';
    return;
  }
  tbody.innerHTML=filtered.map((o,i)=>`
    <tr>
      <td style="color:var(--muted);font-size:0.8rem">#${filtered.length-i}</td>
      <td style="font-weight:500">${o.name}</td>
      <td><a href="tel:${o.phone}" style="color:var(--green);text-decoration:none">${o.phone}</a></td>
      <td>${o.kg} kg</td>
      <td style="font-weight:600">₹${Number(o.amount).toLocaleString('en-IN')}</td>
      <td>
        <select class="status-select s-${o.status}" onchange="updateStatus(${o.id},this.value,this)">
          <option${o.status==='New'?' selected':''}>New</option>
          <option${o.status==='Confirmed'?' selected':''}>Confirmed</option>
          <option${o.status==='Delivered'?' selected':''}>Delivered</option>
          <option${o.status==='Cancelled'?' selected':''}>Cancelled</option>
        </select>
      </td>
      <td style="font-size:0.8rem;color:var(--muted)">${o.time}</td>
      <td>
        <button class="action-btn wa" onclick="waMsg(${o.id})">WhatsApp</button>
        <button class="action-btn del" onclick="deleteOrder(${o.id})">Delete</button>
      </td>
    </tr>
  `).join('');
}

function updateStats(){
  const active=allOrders.filter(o=>o.status!=='Cancelled');
  document.getElementById('statTotal').textContent=allOrders.length;
  document.getElementById('statRevenue').textContent='₹'+active.reduce((s,o)=>s+Number(o.amount),0).toLocaleString('en-IN');
  document.getElementById('statNew').textContent=allOrders.filter(o=>o.status==='New').length;
  document.getElementById('statDelivered').textContent=allOrders.filter(o=>o.status==='Delivered').length;
  document.getElementById('statKg').textContent=active.reduce((s,o)=>s+Number(o.kg||0),0)+' kg';
}

function filterOrders(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

async function updateStatus(id,status,sel){
  sel.className='status-select s-'+status;
  const o=allOrders.find(o=>o.id===id);
  if(o){o.status=status;}
  await saveAllOrders();
  updateStats();
}

async function deleteOrder(id){
  if(!confirm('Delete this order?'))return;
  allOrders=allOrders.filter(o=>o.id!==id);
  await saveAllOrders();
  renderOrders();
}

function waMsg(id){
  const o=allOrders.find(o=>o.id===id);
  if(!o)return;
  const msg=encodeURIComponent('Hi '+o.name+'! Your order of '+o.kg+' kg Jumbo Kesar mangoes (₹'+Number(o.amount).toLocaleString('en-IN')+') has been confirmed. We will deliver to your address shortly. — The Zest Mango 🥭');
  window.open('https://wa.me/91'+o.phone+'?text='+msg,'_blank');
}

function openModal(){document.getElementById('modalOverlay').classList.add('show');}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}

function calcModalPrice(){
  const kg=parseInt(document.getElementById('mKg').value);
  if(!kg)return;
  let price=kg<=10?1400:kg<=20?2650:Math.ceil(kg/10)*1300;
  document.getElementById('mAmount').value=price;
}

async function saveManualOrder(){
  const name=document.getElementById('mName').value.trim();
  const phone=document.getElementById('mPhone').value.trim();
  const address=document.getElementById('mAddress').value.trim();
  const kg=document.getElementById('mKg').value;
  const amount=document.getElementById('mAmount').value;
  const status=document.getElementById('mStatus').value;
  if(!name||!phone||!kg||!amount){alert('Please fill all required fields.');return;}
  const order={id:Date.now(),name,phone,address,kg:parseInt(kg),amount:parseInt(amount),status,time:new Date().toLocaleString('en-IN')};
  // Add to front (display) and save in correct order
  allOrders.unshift(order);
  await saveAllOrders();
  closeModal();
  ['mName','mPhone','mAddress','mKg','mAmount'].forEach(id=>document.getElementById(id).value='');
  renderOrders();
}
</script>
</body>
</html>
